<svg width="1600" height="560" viewBox="0 0 1600 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1600" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F3F5"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111111"/>
      <stop offset="1" stop-color="#343A40"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
    <style>
      .kicker { font: 650 22px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; letter-spacing: 3px; fill: #7A8088; }
      .h { font: 780 54px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; letter-spacing: -2px; fill: #111111; }
      .p { font: 430 26px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; fill: #626A73; }
      .num { font: 760 46px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #C9CDD3; }
      .cardH { font: 760 40px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; letter-spacing: -1px; fill: #111111; }
      .cardP { font: 430 23px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; fill: #636B74; }
      .darkH { font: 760 40px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; letter-spacing: -1px; fill: #FFFFFF; }
      .darkP { font: 430 23px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; fill: #DADDE2; }
    </style>
  </defs>

  <rect width="1600" height="560" rx="52" fill="url(#surface)"/>
  <text x="86" y="106" class="kicker">케이스 스터디</text>
  <text x="84" y="178" class="h">쓰이고, 측정되고, 다시 다듬어진 작업들.</text>
  <text x="88" y="232" class="p">제품과 실험, 그리고 끝까지 완성해가는 방식.</text>

  <g filter="url(#shadow)">
    <rect x="88" y="304" width="450" height="178" rx="34" fill="url(#dark)"/>
  </g>
  <text x="124" y="374" class="num">01</text>
  <text x="216" y="374" class="darkH">KOK</text>
  <text x="216" y="420" class="darkP">약속 장소 흐름을 가볍게.</text>

  <g filter="url(#shadow)">
    <rect x="574" y="304" width="450" height="178" rx="34" fill="#FFFFFF" stroke="#E1E5EA"/>
  </g>
  <text x="610" y="374" class="num">02</text>
  <text x="702" y="374" class="cardH">Recycle VQA</text>
  <text x="702" y="420" class="cardP">private 리더보드 1위.</text>

  <g filter="url(#shadow)">
    <rect x="1060" y="304" width="450" height="178" rx="34" fill="#FFFFFF" stroke="#E1E5EA"/>
  </g>
  <text x="1096" y="374" class="num">03</text>
  <text x="1188" y="374" class="cardH">작은 시스템</text>
  <text x="1188" y="420" class="cardP">ETA와 알고리즘 기록.</text>
</svg>
