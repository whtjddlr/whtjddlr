<svg width="1600" height="800" viewBox="0 0 1600 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#EEF1F6"/>
    </linearGradient>
    <filter id="card" x="-10%" y="-20%" width="120%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#1E2A3D" flood-opacity="0.10"/></filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; }
      .kicker { font-size: 21px; font-weight: 600; letter-spacing: 2px; fill: #64748B; }
      .title  { font-size: 50px; font-weight: 600; letter-spacing: -2px; fill: #0F172A; }
      .sub    { font-size: 25px; font-weight: 400; fill: #5C6470; }
      .repo   { font-size: 25px; font-weight: 600; fill: #0F172A; }
      .desc   { font-size: 19px; font-weight: 400; fill: #5C6470; }
      .lang   { font-size: 17px; font-weight: 500; fill: #6B7686; }
    </style>
  </defs>

  <rect width="1600" height="800" rx="44" fill="url(#bg)"/>

