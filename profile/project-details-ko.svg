<svg width="1600" height="820" viewBox="0 0 1600 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11141B"/>
      <stop offset="1" stop-color="#0C0E14"/>
    </linearGradient>
    <style>
      text { font-family: "SFMono-Regular", "JetBrains Mono", "Cascadia Code", Consolas, "D2Coding", "Malgun Gothic", monospace; }
      .ln { font-size: 25px; font-weight: 500; }
      .arr{ fill:#56D364; } .path{ fill:#39C5CF; } .dollar{ fill:#768390; } .cmd{ fill:#E6EDF3; }
      .gry{ fill:#6E7681; } .h1{ fill:#6BE0FF; font-weight:700; } .key{ fill:#FFA657; }
      .str{ fill:#A5D6FF; } .out{ fill:#ADBAC7; } .accent{ fill:#FFFFFF; font-weight:700; }
      .tag{ fill:#7EE787; } .num{ fill:#FFA657; font-weight:700; }
      .pane{ font-size:20px; fill:#768390; letter-spacing:1px; }
      .titlebar{ font-size:21px; fill:#768390; letter-spacing:1px; }
    </style>
  </defs>

  <rect width="1600" height="820" rx="18" fill="url(#bg)" stroke="#222A35" stroke-width="1.5"/>
  <circle cx="44" cy="40" r="8" fill="#FF5F56"/>
  <circle cx="72" cy="40" r="8" fill="#FFBD2E"/>
  <circle cx="100" cy="40" r="8" fill="#27C93F"/>
  <text x="800" y="47" text-anchor="middle" class="titlebar">sungik@github — tmux: featured-work</text>
  <line x1="0" y1="74" x2="1600" y2="74" stroke="#1C2330" stroke-width="1.5"/>

  <!-- split divider -->
  <line x1="800" y1="74" x2="800" y2="820" stroke="#1C2330" stroke-width="1.5"/>
  <rect x="0" y="74" width="800" height="34" fill="#0E1118"/>
  <rect x="800" y="74" width="800" height="34" fill="#0B0D13"/>
  <text x="40" y="98" class="pane">0: cat projects/KOK.md</text>
  <text x="840" y="98" class="pane">1: cat projects/recycle-vqa.md</text>

  <!-- LEFT PANE: KOK -->
  <g class="ln">
    <text x="40" y="168"><tspan class="gry"># </tspan><tspan class="h1">KOK</tspan>  <tspan class="gry">— 약속 장소 플래너</tspan></text>
    <text x="40" y="226"><tspan class="key">summary</tspan> <tspan class="gry">=</tspan> <tspan class="str">"어디서 볼지, 같이</tspan></text>
    <text x="40" y="262"><tspan class="str">          가볍게 정한다"</tspan></text>

    <text x="40" y="328"><tspan class="key">features</tspan> <tspan class="gry">= [</tspan></text>
    <text x="80" y="364"><tspan class="out">실시간 방 참여,</tspan></text>
    <text x="80" y="400"><tspan class="out">후보 장소 비교,</tspan></text>
    <text x="80" y="436"><tspan class="out">추첨 흐름</tspan></text>
    <text x="40" y="472"><tspan class="gry">]</tspan></text>

    <text x="40" y="538"><tspan class="key">stack</tspan> <tspan class="gry">=</tspan></text>
    <text x="40" y="586"><tspan class="tag">react</tspan>  <tspan class="tag">typescript</tspan>  <tspan class="tag">supabase</tspan></text>

    <text x="40" y="664"><tspan class="key">status</tspan> <tspan class="gry">=</tspan> <tspan class="accent">live</tspan> <tspan class="gry">·</tspan> <tspan class="str">kok-meet.vercel.app</tspan></text>

    <text x="40" y="754"><tspan class="arr">➜</tspan> <tspan class="dollar">$</tspan> <tspan class="cmd">_</tspan></text>
  </g>

  <!-- RIGHT PANE: VQA -->
  <g class="ln">
    <text x="840" y="168"><tspan class="gry"># </tspan><tspan class="h1">Recycle VQA</tspan>  <tspan class="gry">— 이미지 VQA</tspan></text>
    <text x="840" y="226"><tspan class="key">result</tspan> <tspan class="gry">=</tspan> <tspan class="num">#1</tspan> <tspan class="gry">/</tspan> <tspan class="accent">193팀</tspan>  <tspan class="gry">🏆</tspan></text>

    <text x="840" y="300"><tspan class="key">summary</tspan> <tspan class="gry">=</tspan> <tspan class="str">"이미지 기반 VQA</tspan></text>
    <text x="840" y="336"><tspan class="str">          문제를 해결한다"</tspan></text>

    <text x="840" y="402"><tspan class="key">approach</tspan> <tspan class="gry">= [</tspan></text>
    <text x="880" y="438"><tspan class="out">데이터 관찰,</tspan></text>
    <text x="880" y="474"><tspan class="out">학습 전략,</tspan></text>
    <text x="880" y="510"><tspan class="out">제출 실험</tspan></text>
    <text x="840" y="546"><tspan class="gry">]</tspan></text>

    <text x="840" y="612"><tspan class="key">stack</tspan> <tspan class="gry">=</tspan></text>
    <text x="840" y="660"><tspan class="tag">python</tspan>  <tspan class="tag">computer-vision</tspan>  <tspan class="tag">vqa</tspan></text>

    <text x="840" y="754"><tspan class="arr">➜</tspan> <tspan class="dollar">$</tspan> <tspan class="cmd">_</tspan></text>
  </g>

  <rect x="92" y="732" width="13" height="26" fill="#56D364"><animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/></rect>
  <rect x="892" y="732" width="13" height="26" fill="#56D364"><animate attributeName="opacity" values="0;0;1;1" dur="1.1s" repeatCount="indefinite"/></rect>
</svg>
