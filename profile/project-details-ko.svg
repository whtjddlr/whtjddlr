<svg width="1600" height="820" viewBox="0 0 1600 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBFBFD"/><stop offset="1" stop-color="#F0F0F2"/>
    </linearGradient>
    <linearGradient id="dark" x1="94" y1="310" x2="776" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#26262A"/><stop offset="1" stop-color="#1D1D1F"/>
    </linearGradient>
    <linearGradient id="intel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF5E8A"/><stop offset="0.5" stop-color="#A24BFF"/><stop offset="1" stop-color="#2997FF"/>
    </linearGradient>
    <filter id="card" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#1D1D1F" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; }
      .kicker { font-size: 22px; font-weight: 600; letter-spacing: 1px; fill: #0071E3; }
      .title  { font-size: 56px; font-weight: 600; letter-spacing: -2px; fill: #1D1D1F; }
      .sub    { font-size: 26px; font-weight: 400; fill: #6E6E73; }
      .num    { font-size: 30px; font-weight: 600; fill: url(#intel); }
      .h      { font-size: 50px; font-weight: 600; letter-spacing: -1px; }
      .pp     { font-size: 25px; font-weight: 400; }
      .label  { font-size: 21px; font-weight: 600; }
      .chip   { font-size: 19px; font-weight: 500; }
    </style>
  </defs>

  <rect width="1600" height="820" rx="48" fill="url(#bg)"/>
  <text x="92" y="112" class="kicker">FEATURED WORK</text>
  <text x="90" y="184" class="title">테이블 대신, 제품처럼 보이게.</text>
  <text x="94" y="236" class="sub">결과와 흐름이 먼저 읽히도록 두 개의 작업만 크게 보여줍니다.</text>

  <!-- KOK (dark) -->
  <g filter="url(#card)"><rect x="94" y="310" width="682" height="390" rx="44" fill="url(#dark)"/></g>
  <text x="142" y="390" class="num">01</text>
  <text x="142" y="448" class="h" fill="#FFFFFF">KOK</text>
  <text x="142" y="510" class="pp" fill="#D2D2D7">어디서 볼지, 같이 가볍게 정하는</text>
  <text x="142" y="546" class="pp" fill="#D2D2D7">약속 장소 플래너.</text>
  <text x="142" y="606" class="label" fill="#8E8E93">실시간 방 참여 · 후보 장소 비교 · 추첨 흐름</text>
  <g transform="translate(142 636)">
    <rect x="0"   y="0" width="92"  height="40" rx="20" fill="#FFFFFF" fill-opacity="0.14"/><text x="46"  y="26" text-anchor="middle" class="chip" fill="#FFFFFF">React</text>
    <rect x="106" y="0" width="138" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.14"/><text x="175" y="26" text-anchor="middle" class="chip" fill="#FFFFFF">TypeScript</text>
    <rect x="258" y="0" width="124" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.14"/><text x="320" y="26" text-anchor="middle" class="chip" fill="#FFFFFF">Supabase</text>
  </g>

  <!-- VQA (light) -->
  <g filter="url(#card)"><rect x="824" y="310" width="682" height="390" rx="44" fill="#FFFFFF"/></g>
  <text x="872" y="390" class="num">02</text>
  <text x="872" y="448" class="h" fill="#1D1D1F">Recycle VQA</text>
  <text x="872" y="510" class="pp" fill="#6E6E73">이미지 기반 VQA 문제를 해결해</text>
  <text x="872" y="546" class="pp" fill="#6E6E73"><tspan fill="#1D1D1F" font-weight="600">193팀 중 1위</tspan>를 기록했습니다.</text>
  <text x="872" y="606" class="label" fill="#86868B">데이터 관찰 · 학습 전략 · 제출 실험</text>
  <g transform="translate(872 636)">
    <rect x="0"   y="0" width="100" height="40" rx="20" fill="#F0F0F2"/><text x="50"  y="26" text-anchor="middle" class="chip" fill="#1D1D1F">Python</text>
    <rect x="114" y="0" width="184" height="40" rx="20" fill="#F0F0F2"/><text x="206" y="26" text-anchor="middle" class="chip" fill="#1D1D1F">Computer Vision</text>
    <rect x="312" y="0" width="74"  height="40" rx="20" fill="#F0F0F2"/><text x="349" y="26" text-anchor="middle" class="chip" fill="#1D1D1F">VQA</text>
  </g>
</svg>
