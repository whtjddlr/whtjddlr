<svg width="1600" height="820" viewBox="0 0 1600 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F9FAFA"/>
      <stop offset="0.55" stop-color="#F3F5F7"/>
      <stop offset="1" stop-color="#ECEFF3"/>
    </linearGradient>
    <linearGradient id="dark" x1="116" y1="222" x2="760" y2="612" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#121314"/>
      <stop offset="1" stop-color="#2E3338"/>
    </linearGradient>
    <linearGradient id="lightCard" x1="820" y1="222" x2="1484" y2="612" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F3F5F8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="#111827" flood-opacity="0.13"/>
    </filter>
    <style>
      .kicker { font: 650 23px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; letter-spacing: 3px; fill: #7A8088; }
      .title { font: 780 58px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; letter-spacing: -2px; fill: #111111; }
      .sub { font: 430 27px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; fill: #626A73; }
      .numDark { font: 760 42px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #BFC6CF; }
      .numLight { font: 760 42px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #C7CDD5; }
      .hDark { font: 780 48px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; letter-spacing: -1px; fill: #FFFFFF; }
      .hLight { font: 780 48px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; letter-spacing: -1px; fill: #111111; }
      .pDark { font: 440 25px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; fill: #DCE0E5; }
      .pLight { font: 440 25px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; fill: #606A75; }
      .labelDark { font: 650 21px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; fill: #ECEFF3; }
      .labelLight { font: 650 21px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; fill: #3B424A; }
      .chipDark { font: 620 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111111; }
      .chipLight { font: 620 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #FFFFFF; }
    </style>
  </defs>

  <rect width="1600" height="820" rx="54" fill="url(#bg)"/>
  <text x="92" y="112" class="kicker">대표 작업</text>
  <text x="90" y="184" class="title">테이블 대신, 제품처럼 보이게.</text>
  <text x="94" y="238" class="sub">결과와 흐름이 먼저 읽히도록 두 개의 작업만 크게 보여줍니다.</text>

  <g filter="url(#shadow)">
    <rect x="94" y="310" width="682" height="390" rx="46" fill="url(#dark)"/>
  </g>
  <text x="142" y="386" class="numDark">01</text>
  <text x="232" y="386" class="hDark">KOK</text>
  <text x="142" y="460" class="pDark">어디서 볼지, 같이 가볍게 정하는</text>
  <text x="142" y="496" class="pDark">약속 장소 플래너.</text>
  <text x="142" y="566" class="labelDark">실시간 방 참여 · 후보 장소 비교 · 추첨 흐름</text>
  <g transform="translate(142 620)">
    <rect x="0" y="0" width="86" height="38" rx="19" fill="#FFFFFF"/>
    <text x="22" y="25" class="chipDark">React</text>
    <rect x="100" y="0" width="132" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.92"/>
    <text x="122" y="25" class="chipDark">TypeScript</text>
    <rect x="246" y="0" width="124" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.86"/>
    <text x="269" y="25" class="chipDark">Supabase</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="824" y="310" width="682" height="390" rx="46" fill="url(#lightCard)" stroke="#FFFFFF" stroke-width="2"/>
  </g>
  <text x="872" y="386" class="numLight">02</text>
  <text x="962" y="386" class="hLight">Recycle VQA</text>
  <text x="872" y="460" class="pLight">이미지 기반 VQA 문제를 해결해</text>
  <text x="872" y="496" class="pLight">193팀 중 1위를 기록했습니다.</text>
  <text x="872" y="566" class="labelLight">데이터 관찰 · 학습 전략 · 제출 실험</text>
  <g transform="translate(872 620)">
    <rect x="0" y="0" width="96" height="38" rx="19" fill="#111111"/>
    <text x="22" y="25" class="chipLight">Python</text>
    <rect x="110" y="0" width="178" height="38" rx="19" fill="#111111" fill-opacity="0.86"/>
    <text x="132" y="25" class="chipLight">Computer Vision</text>
    <rect x="302" y="0" width="74" height="38" rx="19" fill="#111111" fill-opacity="0.74"/>
    <text x="324" y="25" class="chipLight">VQA</text>
  </g>
</svg>
