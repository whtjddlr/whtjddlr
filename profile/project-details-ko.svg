<svg width="1600" height="820" viewBox="0 0 1600 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#E6ECF4"/>
    </linearGradient>
    <linearGradient id="kokCard" x1="94" y1="310" x2="776" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1D6FE0"/><stop offset="1" stop-color="#0B2E5E"/>
    </linearGradient>
    <linearGradient id="vqaCard" x1="824" y1="310" x2="1506" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#334155"/><stop offset="1" stop-color="#161D2B"/>
    </linearGradient>
    <filter id="card" x="-15%" y="-15%" width="130%" height="140%"><feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#1B2536" flood-opacity="0.3"/></filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; }
      .kicker { font-size: 22px; font-weight: 700; letter-spacing: 1.5px; fill: #2563EB; }
      .title  { font-size: 56px; font-weight: 600; letter-spacing: -2px; fill: #0F172A; }
      .sub    { font-size: 26px; font-weight: 400; fill: #475569; }
      .num    { font-size: 30px; font-weight: 700; fill: #FFFFFF; opacity: 0.7; }
      .h      { font-size: 50px; font-weight: 600; letter-spacing: -1px; fill: #FFFFFF; }
      .pp     { font-size: 25px; font-weight: 400; fill: #FFFFFF; opacity: 0.92; }
      .label  { font-size: 21px; font-weight: 600; fill: #FFFFFF; opacity: 0.7; }
      .chip   { font-size: 19px; font-weight: 600; fill: #FFFFFF; }
    </style>
  </defs>

  <rect width="1600" height="820" rx="48" fill="url(#bg)"/>
  <text x="92" y="112" class="kicker">FEATURED WORK</text>
  <text x="90" y="184" class="title">성과로 증명한 두 프로젝트.</text>
  <text x="94" y="236" class="sub">실제 사용자에게 서비스 중인 제품과, 193팀 중 1위를 기록한 AI 모델.</text>

  <!-- KOK (steel blue) -->
  <g filter="url(#card)"><rect x="94" y="310" width="682" height="390" rx="44" fill="url(#kokCard)"/></g>
  <text x="142" y="390" class="num">01</text>
  <text x="142" y="448" class="h">KOK</text>
  <rect x="600" y="356" width="132" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.16"/>
  <circle cx="628" cy="376" r="6" fill="#34D399"/><text x="646" y="383" font-family="-apple-system,sans-serif" font-size="19" font-weight="600" fill="#FFFFFF">LIVE</text>
  <text x="142" y="510" class="pp">만날 장소를 실시간으로 함께 정하는</text>
  <text x="142" y="546" class="pp">약속 장소 플래너.</text>
  <text x="142" y="606" class="label">실시간 방 참여 · 후보 장소 비교 · 추첨 흐름</text>
  <g transform="translate(142 636)">
    <rect x="0"   y="0" width="92"  height="40" rx="20" fill="#FFFFFF" fill-opacity="0.16"/><text x="46"  y="26" text-anchor="middle" class="chip">React</text>
    <rect x="106" y="0" width="138" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.16"/><text x="175" y="26" text-anchor="middle" class="chip">TypeScript</text>
    <rect x="258" y="0" width="124" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.16"/><text x="320" y="26" text-anchor="middle" class="chip">Supabase</text>
  </g>

  <!-- VQA (gunmetal + amber) -->
  <g filter="url(#card)"><rect x="824" y="310" width="682" height="390" rx="44" fill="url(#vqaCard)"/></g>
  <text x="872" y="390" class="num">02</text>
  <text x="872" y="448" class="h">Recycle VQA</text>
  <rect x="1296" y="356" width="164" height="40" rx="20" fill="#F59E0B"/>
  <text x="1378" y="383" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="19" font-weight="700" fill="#1B1300">🏆 #1 / 193</text>
  <text x="872" y="510" class="pp">이미지 기반 VQA 문제를 해결해</text>
  <text x="872" y="546" class="pp"><tspan font-weight="700" fill="#FBBF24">193팀 중 1위</tspan>를 기록했습니다.</text>
  <text x="872" y="606" class="label">데이터 관찰 · 학습 전략 · 제출 실험</text>
  <g transform="translate(872 636)">
    <rect x="0"   y="0" width="100" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.14"/><text x="50"  y="26" text-anchor="middle" class="chip">Python</text>
    <rect x="114" y="0" width="184" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.14"/><text x="206" y="26" text-anchor="middle" class="chip">Computer Vision</text>
    <rect x="312" y="0" width="74"  height="40" rx="20" fill="#FFFFFF" fill-opacity="0.14"/><text x="349" y="26" text-anchor="middle" class="chip">VQA</text>
  </g>
</svg>
