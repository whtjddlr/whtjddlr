<svg width="1600" height="540" viewBox="0 0 1600 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.0" r="1.1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.6" stop-color="#F4F6FA"/>
      <stop offset="1" stop-color="#ECEFF4"/>
    </radialGradient>
    <linearGradient id="steel" x1="560" y1="0" x2="1040" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/><stop offset="1" stop-color="#0E7490"/>
    </linearGradient>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; }
      .eyebrow { font-size: 22px; font-weight: 600; letter-spacing: 3px; fill: #64748B; }
      .name    { font-size: 104px; font-weight: 600; letter-spacing: -4px; fill: #0F172A; }
      .head    { font-size: 42px; font-weight: 600; letter-spacing: -1px; fill: url(#steel); }
      .sub     { font-size: 27px; font-weight: 400; fill: #5C6470; }
      .chip    { font-size: 20px; font-weight: 600; }
    </style>
  </defs>

  <rect width="1600" height="540" fill="url(#bg)"/>

  <text x="800" y="120" text-anchor="middle" class="eyebrow">WEB · AI · 꾸준한 기록</text>
  <text x="800" y="246" text-anchor="middle" class="name">Sungik Cho</text>
  <text x="800" y="324" text-anchor="middle" class="head">만든 것들을 차곡차곡 기록합니다.</text>
  <text x="800" y="384" text-anchor="middle" class="sub">웹과 AI를 공부하며 직접 부딪혀 본 결과물들입니다.</text>

  <g transform="translate(478 432)">
    <rect x="0"   y="0" width="112" height="46" rx="23" fill="#FFFFFF" stroke="#D7DEE8"/><text x="56"  y="30" text-anchor="middle" class="chip" fill="#2F6DB5">Python</text>
    <rect x="128" y="0" width="90"  height="46" rx="23" fill="#FFFFFF" stroke="#D7DEE8"/><text x="173" y="30" text-anchor="middle" class="chip" fill="#1B7FA8">React</text>
    <rect x="234" y="0" width="138" height="46" rx="23" fill="#FFFFFF" stroke="#D7DEE8"/><text x="303" y="30" text-anchor="middle" class="chip" fill="#3178C6">TypeScript</text>
    <rect x="388" y="0" width="126" height="46" rx="23" fill="#FFFFFF" stroke="#D7DEE8"/><text x="451" y="30" text-anchor="middle" class="chip" fill="#1F8A6B">Supabase</text>
    <rect x="530" y="0" width="184" height="46" rx="23" fill="#FFFFFF" stroke="#D7DEE8"/><text x="622" y="30" text-anchor="middle" class="chip" fill="#0E7490">Computer Vision</text>
  </g>
</svg>
