<svg width="1600" height="760" viewBox="0 0 1600 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0C10"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="win" x1="0" y1="24" x2="0" y2="736" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11141B"/>
      <stop offset="1" stop-color="#0C0E14"/>
    </linearGradient>
    <radialGradient id="gl" cx="0.5" cy="0" r="0.9">
      <stop offset="0" stop-color="#1F6FEB" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#1F6FEB" stop-opacity="0"/>
    </radialGradient>
    <filter id="winShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="24" stdDeviation="40" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <style>
      text { font-family: "SFMono-Regular", "JetBrains Mono", "Cascadia Code", Consolas, "D2Coding", "Malgun Gothic", monospace; }
      .ln   { font-size: 28px; font-weight: 500; }
      .arr  { fill: #56D364; }
      .path { fill: #39C5CF; }
      .dollar { fill: #768390; }
      .cmd  { fill: #E6EDF3; }
      .flag { fill: #FFA657; }
      .out  { fill: #ADBAC7; }
      .accent { fill: #FFFFFF; font-weight: 700; }
      .gry  { fill: #6E7681; }
      .key  { fill: #6BE0FF; }
      .str  { fill: #A5D6FF; }
      .punc { fill: #768390; }
      .num  { fill: #FFA657; font-weight: 700; }
      .tag  { fill: #7EE787; }
      .titlebar { font-size: 22px; fill: #768390; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="1600" height="760" fill="url(#bg)"/>
  <rect width="1600" height="760" fill="url(#gl)"/>

  <!-- window -->
  <g filter="url(#winShadow)">
    <rect x="30" y="24" width="1540" height="712" rx="18" fill="url(#win)" stroke="#222A35" stroke-width="1.5"/>
  </g>
  <!-- title bar -->
  <circle cx="74"  cy="66" r="9" fill="#FF5F56"/>
  <circle cx="106" cy="66" r="9" fill="#FFBD2E"/>
  <circle cx="138" cy="66" r="9" fill="#27C93F"/>
  <text x="800" y="74" text-anchor="middle" class="titlebar">sungik@github — zsh — 120×30</text>
  <line x1="30" y1="108" x2="1570" y2="108" stroke="#1C2330" stroke-width="1.5"/>

  <!-- session -->
  <g class="ln">
    <!-- whoami -->
    <text x="70" y="178"><tspan class="arr">➜</tspan>  <tspan class="path">~/dev</tspan> <tspan class="dollar">$</tspan> <tspan class="cmd">whoami</tspan></text>
    <text x="70" y="224"><tspan class="accent">Sungik Cho</tspan>  <tspan class="gry"># Product · AI · Quiet Execution</tspan></text>

    <!-- cat profile.json -->
    <text x="70" y="284"><tspan class="arr">➜</tspan>  <tspan class="path">~/dev</tspan> <tspan class="dollar">$</tspan> <tspan class="cmd">cat profile.json</tspan></text>
    <text x="70" y="330"><tspan class="punc">{</tspan></text>
    <text x="100" y="376"><tspan class="key">"mission"</tspan><tspan class="punc">:</tspan> <tspan class="str">"실제로 쓰이는 제품과 검증 가능한 AI 결과를 만든다"</tspan><tspan class="punc">,</tspan></text>
    <text x="100" y="422"><tspan class="key">"way"</tspan><tspan class="punc">:</tspan>     <tspan class="str">"작게 시작하고, 끝까지 작동하게, 다시 단순하게"</tspan></text>
    <text x="70" y="468"><tspan class="punc">}</tspan></text>

    <!-- ls skills -->
    <text x="70" y="528"><tspan class="arr">➜</tspan>  <tspan class="path">~/dev</tspan> <tspan class="dollar">$</tspan> <tspan class="cmd">ls skills/</tspan></text>
    <text x="70" y="574"><tspan class="tag">python</tspan>   <tspan class="tag">react</tspan>   <tspan class="tag">typescript</tspan>   <tspan class="tag">supabase</tspan>   <tspan class="tag">computer-vision</tspan></text>

    <!-- featured -->
    <text x="70" y="634"><tspan class="arr">➜</tspan>  <tspan class="path">~/dev</tspan> <tspan class="dollar">$</tspan> <tspan class="cmd">./featured </tspan><tspan class="flag">--top</tspan></text>
    <text x="70" y="680"><tspan class="gry">→</tspan> <tspan class="accent">KOK</tspan>  <tspan class="punc">·</tspan>  <tspan class="accent">Recycle VQA</tspan> <tspan class="punc">[</tspan><tspan class="num">#1 / 193팀</tspan><tspan class="punc">]</tspan>  <tspan class="gry">✓ done</tspan></text>
  </g>

  <!-- blinking cursor -->
  <rect x="468" y="612" width="15" height="30" fill="#56D364">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
