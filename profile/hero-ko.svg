<svg width="1600" height="760" viewBox="0 0 1600 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.08" r="1.1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#EEF2F7"/>
      <stop offset="1" stop-color="#E3E9F1"/>
    </radialGradient>
    <radialGradient id="aura1" cx="0.18" cy="0.2" r="0.5"><stop offset="0" stop-color="#1D6FE0" stop-opacity="0.16"/><stop offset="1" stop-color="#1D6FE0" stop-opacity="0"/></radialGradient>
    <radialGradient id="aura2" cx="0.85" cy="0.25" r="0.5"><stop offset="0" stop-color="#0EA5A4" stop-opacity="0.16"/><stop offset="1" stop-color="#0EA5A4" stop-opacity="0"/></radialGradient>
    <linearGradient id="steel" x1="600" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/><stop offset="0.5" stop-color="#0EA5E9"/><stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="576" x2="0" y2="708" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#16243C"/><stop offset="1" stop-color="#0D1726"/></linearGradient>
    <filter id="card" x="-20%" y="-20%" width="140%" height="170%"><feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#1E2A3D" flood-opacity="0.28"/></filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; }
      .eyebrow { font-size: 23px; font-weight: 700; letter-spacing: 2px; fill: #2563EB; }
      .name    { font-size: 112px; font-weight: 600; letter-spacing: -4px; fill: #0F172A; }
      .head    { font-size: 56px; font-weight: 600; letter-spacing: -1.5px; fill: url(#steel); }
      .sub     { font-size: 29px; font-weight: 400; fill: #475569; }
      .chip    { font-size: 21px; font-weight: 600; }
      .clabel  { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
      .cval    { font-size: 34px; font-weight: 600; letter-spacing: -1px; fill: #FFFFFF; }
    </style>
  </defs>

  <rect width="1600" height="760" fill="url(#bg)"/>
  <rect width="1600" height="760" fill="url(#aura1)"/>
  <rect width="1600" height="760" fill="url(#aura2)"/>

  <text x="800" y="118" text-anchor="middle" class="eyebrow">PRODUCT · AI · FULL-STACK</text>
  <text x="800" y="244" text-anchor="middle" class="name">Sungik Cho</text>
  <text x="800" y="330" text-anchor="middle" class="head">기획부터 출시까지, 제품을 완성합니다.</text>
  <text x="800" y="398" text-anchor="middle" class="sub">실서비스로 운영 중인 제품과 AI 경진대회 193팀 중 1위의 경험.</text>
  <text x="800" y="440" text-anchor="middle" class="sub">프론트엔드부터 백엔드, AI 모델까지 직접 구현합니다.</text>

  <!-- tech pills -->
  <g transform="translate(433 488)">
    <rect x="0"   y="0" width="116" height="48" rx="24" fill="#FFFFFF" stroke="#D7DEE8"/><text x="58"  y="31" text-anchor="middle" class="chip" fill="#2F6DB5">Python</text>
    <rect x="132" y="0" width="92"  height="48" rx="24" fill="#FFFFFF" stroke="#D7DEE8"/><text x="178" y="31" text-anchor="middle" class="chip" fill="#1B7FA8">React</text>
    <rect x="240" y="0" width="142" height="48" rx="24" fill="#FFFFFF" stroke="#D7DEE8"/><text x="311" y="31" text-anchor="middle" class="chip" fill="#3178C6">TypeScript</text>
    <rect x="398" y="0" width="130" height="48" rx="24" fill="#FFFFFF" stroke="#D7DEE8"/><text x="463" y="31" text-anchor="middle" class="chip" fill="#1F8A6B">Supabase</text>
    <rect x="544" y="0" width="190" height="48" rx="24" fill="#FFFFFF" stroke="#D7DEE8"/><text x="639" y="31" text-anchor="middle" class="chip" fill="#0E7490">Computer Vision</text>
  </g>

  <!-- stat cards (dark, accent-coded) -->
  <g filter="url(#card)"><rect x="245" y="576" width="360" height="132" rx="28" fill="url(#navy)"/></g>
  <rect x="245" y="576" width="6" height="132" rx="3" fill="#38BDF8"/>
  <text x="289" y="630" class="clabel" fill="#38BDF8">운영 중 서비스</text>
  <text x="289" y="676" class="cval">KOK</text>
  <circle cx="555" cy="622" r="7" fill="#34D399"/>

  <g filter="url(#card)"><rect x="635" y="576" width="360" height="132" rx="28" fill="url(#navy)"/></g>
  <rect x="635" y="576" width="6" height="132" rx="3" fill="#F59E0B"/>
  <text x="679" y="630" class="clabel" fill="#94A3B8">성과</text>
  <text x="679" y="676" class="cval" fill="#F59E0B">#1 <tspan font-size="24" font-weight="400" fill="#CBD5E1">/ 193팀</tspan></text>

  <g filter="url(#card)"><rect x="1025" y="576" width="360" height="132" rx="28" fill="url(#navy)"/></g>
  <rect x="1025" y="576" width="6" height="132" rx="3" fill="#2DD4BF"/>
  <text x="1069" y="630" class="clabel" fill="#2DD4BF">AI 챌린지</text>
  <text x="1069" y="676" class="cval">Recycle VQA</text>
</svg>
