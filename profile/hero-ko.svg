<svg width="1600" height="760" viewBox="0 0 1600 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBFBFD"/>
      <stop offset="1" stop-color="#F5F5F7"/>
    </linearGradient>
    <linearGradient id="intel" x1="600" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF5E8A"/>
      <stop offset="0.5" stop-color="#A24BFF"/>
      <stop offset="1" stop-color="#2997FF"/>
    </linearGradient>
    <filter id="card" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#1D1D1F" flood-opacity="0.08"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; }
      .eyebrow { font-size: 23px; font-weight: 600; letter-spacing: 1px; fill: #0071E3; }
      .name    { font-size: 112px; font-weight: 600; letter-spacing: -4px; fill: #1D1D1F; }
      .head    { font-size: 56px; font-weight: 600; letter-spacing: -1.5px; fill: url(#intel); }
      .sub     { font-size: 29px; font-weight: 400; fill: #6E6E73; }
      .chip    { font-size: 21px; font-weight: 500; fill: #1D1D1F; }
      .clabel  { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; fill: #86868B; }
      .cval    { font-size: 34px; font-weight: 600; letter-spacing: -1px; fill: #1D1D1F; }
    </style>
  </defs>

  <rect width="1600" height="760" fill="url(#bg)"/>

  <text x="800" y="118" text-anchor="middle" class="eyebrow">PRODUCT · AI · FULL-STACK</text>
  <text x="800" y="244" text-anchor="middle" class="name">Sungik Cho</text>
  <text x="800" y="330" text-anchor="middle" class="head">데모가 아니라, 배포합니다.</text>
  <text x="800" y="398" text-anchor="middle" class="sub">실서비스로 띄운 제품, 193팀 중 1위를 한 AI 모델.</text>
  <text x="800" y="440" text-anchor="middle" class="sub">기획부터 배포까지, 직접 끝을 봅니다.</text>

  <!-- tech pills -->
  <g transform="translate(433 488)">
    <rect x="0"   y="0" width="116" height="48" rx="24" fill="#FFFFFF" stroke="#E3E3E6"/><text x="58"  y="31" text-anchor="middle" class="chip">Python</text>
    <rect x="132" y="0" width="92"  height="48" rx="24" fill="#FFFFFF" stroke="#E3E3E6"/><text x="178" y="31" text-anchor="middle" class="chip">React</text>
    <rect x="240" y="0" width="142" height="48" rx="24" fill="#FFFFFF" stroke="#E3E3E6"/><text x="311" y="31" text-anchor="middle" class="chip">TypeScript</text>
    <rect x="398" y="0" width="130" height="48" rx="24" fill="#FFFFFF" stroke="#E3E3E6"/><text x="463" y="31" text-anchor="middle" class="chip">Supabase</text>
    <rect x="544" y="0" width="190" height="48" rx="24" fill="#FFFFFF" stroke="#E3E3E6"/><text x="639" y="31" text-anchor="middle" class="chip">Computer Vision</text>
  </g>

  <!-- stat cards -->
  <g filter="url(#card)">
    <rect x="245" y="576" width="360" height="132" rx="30" fill="#FFFFFF"/>
  </g>
  <text x="285" y="630" class="clabel">라이브 제품</text>
  <text x="285" y="676" class="cval">KOK</text>
  <circle cx="555" cy="622" r="6" fill="#34C759"/>

  <g filter="url(#card)">
    <rect x="635" y="576" width="360" height="132" rx="30" fill="#1D1D1F"/>
  </g>
  <text x="675" y="630" class="clabel">성과</text>
  <text x="675" y="676" class="cval" fill="#FFFFFF">#1 <tspan font-size="24" font-weight="400" fill="#A1A1A6">/ 193팀</tspan></text>

  <g filter="url(#card)">
    <rect x="1025" y="576" width="360" height="132" rx="30" fill="#FFFFFF"/>
  </g>
  <text x="1065" y="630" class="clabel">AI 챌린지</text>
  <text x="1065" y="676" class="cval">Recycle VQA</text>
</svg>
