<svg width="1600" height="760" viewBox="0 0 1600 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.1" r="1.1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#F6F7FB"/>
      <stop offset="1" stop-color="#EEF1F8"/>
    </radialGradient>
    <radialGradient id="aura1" cx="0.2" cy="0.2" r="0.5"><stop offset="0" stop-color="#FF5E8A" stop-opacity="0.18"/><stop offset="1" stop-color="#FF5E8A" stop-opacity="0"/></radialGradient>
    <radialGradient id="aura2" cx="0.85" cy="0.25" r="0.5"><stop offset="0" stop-color="#2997FF" stop-opacity="0.20"/><stop offset="1" stop-color="#2997FF" stop-opacity="0"/></radialGradient>
    <linearGradient id="intel" x1="600" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF5E8A"/><stop offset="0.5" stop-color="#A24BFF"/><stop offset="1" stop-color="#2997FF"/>
    </linearGradient>
    <linearGradient id="blueCard" x1="245" y1="576" x2="605" y2="708" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#EAF3FF"/><stop offset="1" stop-color="#D6E8FF"/></linearGradient>
    <linearGradient id="vivid" x1="635" y1="576" x2="995" y2="708" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#0A84FF"/><stop offset="1" stop-color="#A24BFF"/></linearGradient>
    <linearGradient id="pinkCard" x1="1025" y1="576" x2="1385" y2="708" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#FFEAF1"/><stop offset="1" stop-color="#FFDCEA"/></linearGradient>
    <filter id="card" x="-20%" y="-20%" width="140%" height="170%"><feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#5B6478" flood-opacity="0.18"/></filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; }
      .eyebrow { font-size: 23px; font-weight: 700; letter-spacing: 2px; fill: #A24BFF; }
      .name    { font-size: 112px; font-weight: 600; letter-spacing: -4px; fill: #1D1D1F; }
      .head    { font-size: 56px; font-weight: 600; letter-spacing: -1.5px; fill: url(#intel); }
      .sub     { font-size: 29px; font-weight: 400; fill: #5C6470; }
      .chip    { font-size: 21px; font-weight: 600; }
      .clabel  { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
      .cval    { font-size: 34px; font-weight: 600; letter-spacing: -1px; }
    </style>
  </defs>

  <rect width="1600" height="760" fill="url(#bg)"/>
  <rect width="1600" height="760" fill="url(#aura1)"/>
  <rect width="1600" height="760" fill="url(#aura2)"/>

  <text x="800" y="118" text-anchor="middle" class="eyebrow">PRODUCT · AI · FULL-STACK</text>
  <text x="800" y="244" text-anchor="middle" class="name">Sungik Cho</text>
  <text x="800" y="330" text-anchor="middle" class="head">기획부터 출시까지, 제품을 완성합니다.</text>
  <text x="800" y="398" text-anchor="middle" class="sub">실서비스로 운영 중인 제품과 AI 경진대회 193팀 중 1위의 경험.</text>
  <text x="800" y="440" text-anchor="middle" class="sub">프론트엔드부터 백엔드, AI 모델까지 직접 구현합니다.</text>

  <!-- tech pills (color-coded) -->
  <g transform="translate(433 488)">
    <rect x="0"   y="0" width="116" height="48" rx="24" fill="#FFFFFF" stroke="#E3E3E6"/><text x="58"  y="31" text-anchor="middle" class="chip" fill="#3776AB">Python</text>
    <rect x="132" y="0" width="92"  height="48" rx="24" fill="#FFFFFF" stroke="#E3E3E6"/><text x="178" y="31" text-anchor="middle" class="chip" fill="#149ECA">React</text>
    <rect x="240" y="0" width="142" height="48" rx="24" fill="#FFFFFF" stroke="#E3E3E6"/><text x="311" y="31" text-anchor="middle" class="chip" fill="#3178C6">TypeScript</text>
    <rect x="398" y="0" width="130" height="48" rx="24" fill="#FFFFFF" stroke="#E3E3E6"/><text x="463" y="31" text-anchor="middle" class="chip" fill="#3FCF8E">Supabase</text>
    <rect x="544" y="0" width="190" height="48" rx="24" fill="#FFFFFF" stroke="#E3E3E6"/><text x="639" y="31" text-anchor="middle" class="chip" fill="#A24BFF">Computer Vision</text>
  </g>

  <!-- stat cards -->
  <g filter="url(#card)"><rect x="245" y="576" width="360" height="132" rx="30" fill="url(#blueCard)"/></g>
  <text x="285" y="630" class="clabel" fill="#0071E3">운영 중 서비스</text>
  <text x="285" y="676" class="cval" fill="#0A2540">KOK</text>
  <circle cx="555" cy="622" r="7" fill="#34C759"/>

  <g filter="url(#card)"><rect x="635" y="576" width="360" height="132" rx="30" fill="url(#vivid)"/></g>
  <text x="675" y="630" class="clabel" fill="#FFFFFF" opacity="0.85">성과</text>
  <text x="675" y="676" class="cval" fill="#FFFFFF">#1 <tspan font-size="24" font-weight="400" fill="#FFFFFF" opacity="0.8">/ 193팀</tspan></text>

  <g filter="url(#card)"><rect x="1025" y="576" width="360" height="132" rx="30" fill="url(#pinkCard)"/></g>
  <text x="1065" y="630" class="clabel" fill="#FF2D78">AI 챌린지</text>
  <text x="1065" y="676" class="cval" fill="#3A0A24">Recycle VQA</text>
</svg>
