  <text x="209" y="188" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="16" font-weight="900" fill="#FAF9F3">RECYCLE</text>
  <text x="110" y="264" font-family="Consolas, Monaco, monospace" font-size="13" font-weight="800" fill="#31572C">AI / VISION / CHALLENGE</text>

