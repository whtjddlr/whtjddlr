<svg width="1200" height="290" viewBox="0 0 1200 290" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Recycle VQA Challenge project card</title>
  <desc id="desc">Editorial project card for the Recycle VQA Challenge solution.</desc>
  <rect width="1200" height="290" rx="18" fill="#FAF9F3"/>
  <rect x="1" y="1" width="1198" height="288" rx="17" stroke="#D7DDD2" stroke-width="2"/>
  <text x="42" y="72" font-family="Consolas, Monaco, monospace" font-size="32" font-weight="800" fill="#31572C">02</text>
  <rect x="110" y="44" width="198" height="198" rx="10" fill="#123D2A"/>
  <circle cx="209" cy="118" r="42" fill="#FAF9F3"/>
