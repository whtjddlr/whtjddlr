  <text x="354" y="162" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#111111">for recycling images, ranked 1st of 193 teams.</text>
  <rect x="354" y="188" width="48" height="5" fill="#31572C"/>
  <text x="354" y="228" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#4B5563">Small visual clues, cleaner decisions.</text>

