<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">Sungik Cho commit snake banner</title>
  <desc id="desc">A soft green developer banner with a cute snake eating commit squares.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="52%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="snake" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="48%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#14532d" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="280" rx="34" fill="url(#bg)"/>
  <rect x="18" y="18" width="1164" height="244" rx="26" fill="#ffffff" opacity="0.54"/>

  <g opacity="0.55">
    <rect x="74" y="218" width="18" height="18" rx="5" fill="#86efac"/>
    <rect x="100" y="218" width="18" height="18" rx="5" fill="#bbf7d0"/>
    <rect x="126" y="218" width="18" height="18" rx="5" fill="#22c55e"/>
    <rect x="152" y="218" width="18" height="18" rx="5" fill="#dcfce7"/>
    <rect x="178" y="218" width="18" height="18" rx="5" fill="#86efac"/>
    <rect x="204" y="218" width="18" height="18" rx="5" fill="#bbf7d0"/>
    <rect x="230" y="218" width="18" height="18" rx="5" fill="#22c55e"/>
    <rect x="256" y="218" width="18" height="18" rx="5" fill="#dcfce7"/>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="72" y="88" font-size="22" font-weight="700" fill="#16a34a" letter-spacing="2">COMMIT SNAKE GARDEN</text>
    <text x="70" y="150" font-size="58" font-weight="800" fill="#052e16">SUNGIK CHO</text>
    <text x="74" y="190" font-size="22" font-weight="600" fill="#166534">feeding the snake with Python, automation, and tiny daily commits</text>
  </g>

  <g transform="translate(805 52)" filter="url(#softShadow)">
    <rect x="2" y="154" width="46" height="46" rx="12" fill="#dcfce7"/>
    <rect x="58" y="154" width="46" height="46" rx="12" fill="#bbf7d0"/>
    <rect x="114" y="154" width="46" height="46" rx="12" fill="#86efac"/>
    <rect x="170" y="154" width="46" height="46" rx="12" fill="#22c55e"/>
    <rect x="226" y="154" width="46" height="46" rx="12" fill="#16a34a"/>

    <rect x="64" y="104" width="46" height="46" rx="12" fill="#dcfce7"/>
    <rect x="120" y="104" width="46" height="46" rx="12" fill="#bbf7d0"/>
    <rect x="176" y="104" width="46" height="46" rx="12" fill="#86efac"/>

    <path d="M18 112 C58 60 118 68 150 116 C174 154 230 138 260 92" fill="none" stroke="url(#snake)" stroke-width="34" stroke-linecap="round"/>
    <circle cx="268" cy="86" r="30" fill="#16a34a"/>
    <circle cx="258" cy="78" r="5" fill="#052e16"/>
    <circle cx="280" cy="76" r="5" fill="#052e16"/>
    <path d="M294 88 C308 82 315 82 326 88" fill="none" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
    <path d="M326 88 L336 81 M326 88 L337 96" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g font-family="Fira Code, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" font-weight="700" fill="#14532d" opacity="0.72">
    <text x="900" y="232">git commit -m "snack"</text>
  </g>
</svg>
