<svg width="1200" height="290" viewBox="0 0 1200 290" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">BBaru project card</title>
  <desc id="desc">Editorial project card for BBaru, an ETA product prototype.</desc>
  <rect width="1200" height="290" rx="18" fill="#FAF9F3"/>
  <rect x="1" y="1" width="1198" height="288" rx="17" stroke="#D7DDD2" stroke-width="2"/>
  <text x="42" y="72" font-family="Consolas, Monaco, monospace" font-size="32" font-weight="800" fill="#31572C">01</text>
  <rect x="110" y="44" width="198" height="198" rx="10" fill="#111111"/>
  <rect x="122" y="56" width="174" height="174" rx="4" stroke="#31572C" stroke-width="3"/>
  <text x="209" y="148" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="700" fill="#FAF9F3">BBaru</text>
  <text x="110" y="264" font-family="Consolas, Monaco, monospace" font-size="13" font-weight="800" fill="#31572C">ETA / PRODUCT / PROTOTYPE</text>

  <text x="354" y="88" font-family="Arial Black, Impact, sans-serif" font-size="46" font-weight="900" fill="#111111">BBaru</text>
  <text x="354" y="132" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#111111">A mobile-first ETA prototype that recommends when to leave,</text>
  <text x="354" y="162" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#111111">so arrival feels intentional instead of accidental.</text>
  <rect x="354" y="188" width="48" height="5" fill="#31572C"/>
  <text x="354" y="228" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#4B5563">Better timing makes better movement.</text>

  <g transform="translate(354 246)">
    <rect width="72" height="24" rx="5" fill="#FFFFFF" stroke="#D7DDD2"/>
    <text x="36" y="16" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="800" fill="#31572C">REACT</text>
    <rect x="82" width="62" height="24" rx="5" fill="#FFFFFF" stroke="#D7DDD2"/>
    <text x="113" y="16" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="800" fill="#31572C">VITE</text>
    <rect x="154" width="92" height="24" rx="5" fill="#FFFFFF" stroke="#D7DDD2"/>
    <text x="200" y="16" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="800" fill="#31572C">TMAP API</text>
    <rect x="256" width="76" height="24" rx="5" fill="#FFFFFF" stroke="#D7DDD2"/>
    <text x="294" y="16" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="11" font-weight="800" fill="#31572C">VERCEL</text>
  </g>

  <g transform="translate(886 48)">
    <path d="M0 0H250" stroke="#D7DDD2" stroke-width="2"/>
    <text x="0" y="39" font-family="Consolas, Monaco, monospace" font-size="14" font-weight="900" fill="#111111">TYPE</text>
    <text x="92" y="39" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#111111">Product prototype</text>
    <path d="M0 68H250" stroke="#D7DDD2" stroke-width="2"/>
    <text x="0" y="107" font-family="Consolas, Monaco, monospace" font-size="14" font-weight="900" fill="#111111">LIVE</text>
    <text x="92" y="107" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#111111">legend-gules.vercel.app</text>
    <path d="M0 136H250" stroke="#D7DDD2" stroke-width="2"/>
    <text x="0" y="175" font-family="Consolas, Monaco, monospace" font-size="14" font-weight="900" fill="#111111">STACK</text>
    <text x="92" y="175" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#111111">React, Vite, Tmap</text>
    <text x="92" y="202" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#111111">JavaScript API</text>
    <path d="M0 226H250" stroke="#D7DDD2" stroke-width="2"/>
  </g>
</svg>
