<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sungik Cho studio index hero</title>
  <desc id="desc">Editorial portfolio hero for Sungik Cho, whtjddlr.</desc>
  <rect width="1200" height="560" rx="24" fill="#FAF9F3"/>
  <rect x="1" y="1" width="1198" height="558" rx="23" stroke="#D7DDD2" stroke-width="2"/>
  <path d="M56 82H1144" stroke="#111111" stroke-width="2"/>
  <text x="56" y="58" font-family="Consolas, Monaco, monospace" font-size="18" font-weight="700" fill="#111111" letter-spacing="1.5">STUDIO INDEX</text>
  <text x="218" y="58" font-family="Consolas, Monaco, monospace" font-size="18" font-weight="700" fill="#31572C">001</text>
  <text x="1012" y="58" font-family="Consolas, Monaco, monospace" font-size="15" font-weight="700" fill="#111111" letter-spacing="1.5">README / PROFILE</text>

  <text x="52" y="220" font-family="Arial Black, Impact, sans-serif" font-size="108" font-weight="900" fill="#111111" letter-spacing="-2">SUNGIK CHO</text>
  <text x="60" y="274" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="800" fill="#111111">whtjddlr</text>
  <rect x="60" y="310" width="58" height="7" fill="#31572C"/>
  <text x="60" y="366" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="500" fill="#111111">I turn loose ideas into useful systems.</text>
  <text x="60" y="408" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#4B5563">Python, automation, AI, and product thinking for tools that feel clear.</text>
  <text x="60" y="466" font-family="Consolas, Monaco, monospace" font-size="18" font-weight="700" fill="#31572C">$ builder at heart. shipper by habit.</text>

  <g transform="translate(840 132)">
