    <text x="130" y="42" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#111111">Developer / Builder</text>
    <path d="M0 72H330" stroke="#D7DDD2" stroke-width="2"/>
    <text x="0" y="114" font-family="Consolas, Monaco, monospace" font-size="14" font-weight="800" fill="#111111">FOCUS</text>
    <text x="130" y="114" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#111111">Python, Automation,</text>
    <text x="130" y="145" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#111111">AI, Data, Systems</text>
    <path d="M0 176H330" stroke="#D7DDD2" stroke-width="2"/>
    <text x="0" y="218" font-family="Consolas, Monaco, monospace" font-size="14" font-weight="800" fill="#111111">GITHUB</text>
    <text x="130" y="218" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#111111">github.com/whtjddlr</text>
    <path d="M0 248H330" stroke="#D7DDD2" stroke-width="2"/>
    <text x="0" y="290" font-family="Consolas, Monaco, monospace" font-size="14" font-weight="800" fill="#111111">OPEN TO</text>
    <text x="130" y="290" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#111111">Meaningful projects</text>
    <text x="130" y="321" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#111111">and sharp problems</text>
