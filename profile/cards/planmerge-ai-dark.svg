  <ellipse cx="220" cy="139" rx="90" ry="62" fill="#8B5CF6" fill-opacity="0.13" filter="url(#glow)"/>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -16; 0 0" dur="5.4s" begin="-2.8s" repeatCount="indefinite"/>
    <rect x="150" y="70" width="140" height="140" rx="36" fill="url(#tileGradient)" filter="url(#tileShadow)"/>
    <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
      <rect x="185" y="105" width="70" height="70" rx="13" stroke-width="8"/>
