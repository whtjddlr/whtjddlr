<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 520">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="tileShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
    <linearGradient id="tileGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#15803D"/>
    </linearGradient>  </defs>
  <rect width="440" height="520" rx="28" fill="#f8fafc"/>
  <rect x="1" y="1" width="438" height="518" rx="28" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" filter="url(#cardShadow)"/>
  <ellipse cx="220" cy="139" rx="90" ry="62" fill="#16A34A" fill-opacity="0.18" filter="url(#glow)"/>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -16; 0 0" dur="5.7s" begin="-3.5s" repeatCount="indefinite"/>
    <rect x="150" y="70" width="140" height="140" rx="36" fill="url(#tileGradient)" filter="url(#tileShadow)"/>
    <g transform="translate(178 98) scale(3.5)" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="14.31" y1="8" x2="20.05" y2="17.94"/>
        <line x1="9.69" y1="8" x2="21.17" y2="8"/>
        <line x1="7.38" y1="12" x2="13.12" y2="2.06"/>
        <line x1="9.69" y1="16" x2="3.95" y2="6.06"/>
        <line x1="14.31" y1="16" x2="2.83" y2="16"/>
        <line x1="16.62" y1="12" x2="10.88" y2="21.94"/>
    </g>
  </g>
  <text x="220" y="286" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" font-size="40" font-weight="700" fill="#1e293b">Recycle VQA</text>
  <text x="220" y="329" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" font-size="26" fill="#64748b">Computer Vision</text>
  <g>
    <rect x="157" y="361" width="126" height="46" rx="23" fill="#16A34A" fill-opacity="0.1" stroke="#16A34A" stroke-opacity="0.2"/>
    <circle cx="185" cy="384" r="6" fill="#16A34A"/>
    <text x="203" y="392" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" font-size="21" font-weight="600" fill="#16A34A">Python</text>
  </g>
  <text x="220" y="461" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" font-size="22" font-weight="700" fill="#16A34A">저장소 보기 →</text>
</svg>
