    <rect x="150" y="70" width="140" height="140" rx="36" fill="#21262d" stroke="#30363d" filter="url(#tileShadow)"/>
    <g>
    <rect x="184" y="126" width="58" height="36" rx="8" fill="#34D399"/>
    <rect x="184" y="137" width="58" height="8" fill="#064e3b" fill-opacity="0.34"/>
