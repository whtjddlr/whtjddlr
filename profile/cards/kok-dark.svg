  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -7; 0 0" dur="4.2s" begin="-0.7s" repeatCount="indefinite"/>
    <rect x="150" y="70" width="140" height="140" rx="36" fill="#21262d" stroke="#30363d" filter="url(#tileShadow)"/>
    <path d="M220 99c-24 0-43 19-43 43 0 31 43 68 43 68s43-37 43-68c0-24-19-43-43-43z" fill="#FF5A5F"/>
