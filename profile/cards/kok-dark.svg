    <circle cx="165" cy="384" r="6" fill="#FF5A5F"/>
    <text x="183" y="392" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" font-size="21" font-weight="600" fill="#FF7A7E">TypeScript</text>
