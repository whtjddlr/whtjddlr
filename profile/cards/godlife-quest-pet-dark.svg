<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 520">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#010409" flood-opacity="0.32"/>
    </filter>
    <filter id="tileShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#010409" flood-opacity="0.26"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
    <clipPath id="tileClip">
      <rect x="150" y="70" width="140" height="140" rx="36"/>
    </clipPath>
  </defs>
  <rect width="440" height="520" rx="28" fill="#0d1117"/>
  <rect x="1" y="1" width="438" height="518" rx="28" fill="#161b22" stroke="#30363d" stroke-width="2" filter="url(#cardShadow)"/>
  <ellipse cx="220" cy="139" rx="90" ry="62" fill="#F59E0B" fill-opacity="0.13" filter="url(#glow)"/>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -16; 0 0" dur="6.0s" begin="-4.2s" repeatCount="indefinite"/>
    <rect x="150" y="70" width="140" height="140" rx="36" fill="#ffffff" stroke="#e6edf3" stroke-opacity="0.25" filter="url(#tileShadow)"/>
    <svg x="150" y="70" width="140" height="140" viewBox="0 0 88 88" preserveAspectRatio="xMidYMid slice">
      <defs>
        <clipPath id="questLogoClip-dark">
          <rect width="88" height="88" rx="23"/>
        </clipPath>
      </defs>
      <image x="0" y="0" width="88" height="88" preserveAspectRatio="xMidYMid slice" clip-path="url(#questLogoClip-dark)" href="data:image/png;base64,"/>
    </svg>
    <rect x="150" y="70" width="140" height="140" rx="36" fill="none" stroke="#e6edf3" stroke-opacity="0.25"/>
  </g>
  <text x="220" y="286" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" font-size="40" font-weight="700" fill="#e6edf3">quest pet</text>
  <text x="220" y="329" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" font-size="26" fill="#8b949e">루틴 퀘스트</text>
  <g>
    <rect x="141" y="361" width="158" height="46" rx="23" fill="#F59E0B" fill-opacity="0.14" stroke="#F59E0B" stroke-opacity="0.28"/>
    <circle cx="169" cy="384" r="6" fill="#F59E0B"/>
    <text x="187" y="392" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" font-size="21" font-weight="600" fill="#FBBF24">JavaScript</text>
  </g>
  <text x="220" y="461" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" font-size="22" font-weight="700" fill="#FBBF24">저장소 보기 →</text>
</svg>
