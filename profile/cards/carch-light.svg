    <rect x="222" y="157" width="14" height="4.5" rx="2.25" fill="#ffffff" fill-opacity="0.56"/>
    <path d="M250 104l2.5 6 6 2.5-6 2.5-2.5 6-2.5-6-6-2.5 6-2.5z" fill="#34D399"/>
