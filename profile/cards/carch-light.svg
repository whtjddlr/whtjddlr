  <ellipse cx="220" cy="139" rx="90" ry="62" fill="#34D399" fill-opacity="0.2" filter="url(#glow)"/>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -16; 0 0" dur="5.0s" begin="-2.1s" repeatCount="indefinite"/>
    <rect x="150" y="70" width="140" height="140" rx="36" fill="#ffffff" filter="url(#tileShadow)"/>
    <g>
    <rect x="184" y="130" width="58" height="36" rx="8" fill="#34D399"/>
    <rect x="184" y="141" width="58" height="8" fill="#0f766e" fill-opacity="0.3"/>
