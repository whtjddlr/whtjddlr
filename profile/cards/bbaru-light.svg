<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 520">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="tileShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
  </defs>
  <rect width="440" height="520" rx="28" fill="#f8fafc"/>
  <rect x="1" y="1" width="438" height="518" rx="28" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" filter="url(#cardShadow)"/>
  <ellipse cx="220" cy="139" rx="90" ry="62" fill="#3B82F6" fill-opacity="0.2" filter="url(#glow)"/>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -16; 0 0" dur="4.6s" begin="-1.4s" repeatCount="indefinite"/>
    <rect x="150" y="70" width="140" height="140" rx="36" fill="#ffffff" stroke="#e2e8f0" filter="url(#tileShadow)"/>
    <svg x="150" y="70" width="140" height="140" viewBox="0 0 88 88" preserveAspectRatio="xMidYMid slice">
      <defs>
        <clipPath id="bbaruLogoClip-light">
          <rect width="88" height="88" rx="23"/>
        </clipPath>
      </defs>
      <image x="0" y="0" width="88" height="88" preserveAspectRatio="xMidYMid slice" clip-path="url(#bbaruLogoClip-light)" href="data:image/png;base64,"/>
    </svg>
    <rect x="150" y="70" width="140" height="140" rx="36" fill="none" stroke="#e2e8f0"/>
  </g>
  <text x="220" y="286" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" font-size="40" font-weight="700" fill="#1e293b">BBaru</text>
  <text x="220" y="329" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" font-size="26" fill="#64748b">ETA 앱</text>
  <g>
    <rect x="137" y="361" width="166" height="46" rx="23" fill="#3B82F6" fill-opacity="0.1" stroke="#3B82F6" stroke-opacity="0.2"/>
    <circle cx="165" cy="384" r="6" fill="#3B82F6"/>
    <text x="183" y="392" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" font-size="21" font-weight="600" fill="#3B82F6">TypeScript</text>
  </g>
  <text x="220" y="461" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" font-size="22" font-weight="700" fill="#3B82F6">저장소 보기 →</text>
</svg>
