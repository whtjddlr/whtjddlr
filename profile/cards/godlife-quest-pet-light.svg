<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 520">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="tileShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
    <clipPath id="tileClip">
      <rect x="150" y="70" width="140" height="140" rx="36"/>
    </clipPath>
  </defs>
  <rect width="440" height="520" rx="28" fill="#f8fafc"/>
  <rect x="1" y="1" width="438" height="518" rx="28" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" filter="url(#cardShadow)"/>
  <ellipse cx="220" cy="139" rx="90" ry="62" fill="#F59E0B" fill-opacity="0.22" filter="url(#glow)"/>
  <g filter="url(#tileShadow)">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -7; 0 0" dur="6.0s" begin="-4.2s" repeatCount="indefinite"/>
    <rect x="150" y="70" width="140" height="140" rx="36" fill="#7dd3fc"/>
    <g clip-path="url(#tileClip)">
      <rect x="150" y="70" width="140" height="92" fill="#7dd3fc"/>
      <rect x="150" y="162" width="140" height="48" fill="#22c55e"/>
      <rect x="188" y="88" width="16" height="50" fill="#ffffff"/>
      <rect x="236" y="88" width="16" height="50" fill="#ffffff"/>
      <rect x="196" y="96" width="8" height="34" fill="#f9a8d4"/>
      <rect x="236" y="96" width="8" height="34" fill="#f9a8d4"/>
      <rect x="188" y="120" width="64" height="8" fill="#ffffff"/>
      <rect x="180" y="128" width="80" height="8" fill="#ffffff"/>
      <rect x="172" y="136" width="96" height="48" fill="#ffffff"/>
      <rect x="180" y="184" width="80" height="8" fill="#ffffff"/>
      <rect x="196" y="150" width="8" height="8" fill="#111827"/>
      <rect x="236" y="150" width="8" height="8" fill="#111827"/>
      <rect x="216" y="164" width="8" height="8" fill="#fb7185"/>
      <rect x="208" y="172" width="8" height="8" fill="#111827" fill-opacity="0.45"/>
      <rect x="224" y="172" width="8" height="8" fill="#111827" fill-opacity="0.45"/>
    </g>
  </g>
  <text x="220" y="286" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" font-size="40" font-weight="700" fill="#1e293b">quest pet</text>
  <text x="220" y="329" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" font-size="26" fill="#64748b">루틴 퀘스트</text>
  <g>
    <rect x="141" y="361" width="158" height="46" rx="23" fill="#F59E0B" fill-opacity="0.12" stroke="#F59E0B" stroke-opacity="0.22"/>
    <circle cx="169" cy="384" r="6" fill="#F59E0B"/>
    <text x="187" y="392" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" font-size="21" font-weight="600" fill="#d97706">JavaScript</text>
  </g>
  <text x="220" y="461" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" font-size="22" font-weight="700" fill="#d97706">저장소 보기 →</text>
</svg>
