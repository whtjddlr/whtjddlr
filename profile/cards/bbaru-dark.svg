<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 520">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#010409" flood-opacity="0.32"/>
    </filter>
    <filter id="tileShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#010409" flood-opacity="0.26"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
    <linearGradient id="tileGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>  </defs>
  <rect width="440" height="520" rx="28" fill="#0d1117"/>
  <rect x="1" y="1" width="438" height="518" rx="28" fill="#161b22" stroke="#30363d" stroke-width="2" filter="url(#cardShadow)"/>
  <ellipse cx="220" cy="139" rx="90" ry="62" fill="#3B82F6" fill-opacity="0.13" filter="url(#glow)"/>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -16; 0 0" dur="4.6s" begin="-1.4s" repeatCount="indefinite"/>
    <rect x="150" y="70" width="140" height="140" rx="36" fill="url(#tileGradient)" filter="url(#tileShadow)"/>
    <circle cx="220" cy="140" r="40.5" fill="none" stroke="#ffffff" stroke-width="8"/>
    <path d="M232 104l-17 34h23l-34 39 13-31h-19z" fill="#ffffff"/>
  </g>
  <text x="220" y="286" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" font-size="40" font-weight="700" fill="#e6edf3">BBaru</text>
  <text x="220" y="329" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" font-size="26" fill="#8b949e">ETA 앱</text>
  <g>
    <rect x="137" y="361" width="166" height="46" rx="23" fill="#3B82F6" fill-opacity="0.14" stroke="#3B82F6" stroke-opacity="0.28"/>
    <circle cx="165" cy="384" r="6" fill="#3B82F6"/>
    <text x="183" y="392" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" font-size="21" font-weight="600" fill="#60A5FA">TypeScript</text>
  </g>
  <text x="220" y="461" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif" font-size="22" font-weight="700" fill="#60A5FA">저장소 보기 →</text>
