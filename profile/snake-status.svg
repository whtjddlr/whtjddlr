<svg xmlns="http://www.w3.org/2000/svg" width="980" height="250" viewBox="0 0 980 250" role="img" aria-labelledby="title desc">
  <title id="title">Snake status card</title>
  <desc id="desc">A playful profile card showing a cute commit snake status panel.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="55%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="55%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#052e16" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="980" height="250" rx="30" fill="#ecfdf5"/>
  <rect x="20" y="20" width="940" height="210" rx="26" fill="url(#panel)" filter="url(#shadow)"/>
  <rect x="44" y="44" width="892" height="162" rx="22" fill="#ffffff" opacity="0.08"/>

  <g transform="translate(74 62)">
    <rect x="0" y="92" width="34" height="34" rx="10" fill="#bbf7d0"/>
    <rect x="42" y="92" width="34" height="34" rx="10" fill="#86efac"/>
    <rect x="84" y="92" width="34" height="34" rx="10" fill="#22c55e"/>
    <rect x="126" y="92" width="34" height="34" rx="10" fill="#4ade80"/>
    <path d="M10 66 C42 32 82 36 106 66 C128 94 168 82 190 50" fill="none" stroke="#86efac" stroke-width="24" stroke-linecap="round"/>
    <circle cx="198" cy="46" r="24" fill="#22c55e"/>
    <circle cx="189" cy="40" r="4" fill="#052e16"/>
    <circle cx="207" cy="39" r="4" fill="#052e16"/>
    <path d="M219 48 C228 44 234 44 242 49" fill="none" stroke="#fda4af" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="338" y="78" font-size="21" font-weight="800" fill="#bbf7d0">SNAKE STATUS</text>
    <text x="338" y="116" font-size="42" font-weight="850" fill="#ffffff">well-fed and still hunting</text>
    <text x="338" y="148" font-size="18" font-weight="650" fill="#dcfce7">current quest: keep the contribution garden alive</text>

    <rect x="338" y="168" width="410" height="18" rx="9" fill="#052e16"/>
    <rect x="338" y="168" width="314" height="18" rx="9" fill="url(#bar)"/>
    <text x="766" y="184" font-size="15" font-weight="800" fill="#bbf7d0">76% full</text>

    <rect x="338" y="198" width="94" height="30" rx="15" fill="#bbf7d0"/>
    <text x="358" y="219" font-size="14" font-weight="900" fill="#052e16">Python</text>
    <rect x="442" y="198" width="118" height="30" rx="15" fill="#86efac"/>
    <text x="461" y="219" font-size="14" font-weight="900" fill="#052e16">Automation</text>
    <rect x="570" y="198" width="116" height="30" rx="15" fill="#4ade80"/>
    <text x="591" y="219" font-size="14" font-weight="900" fill="#052e16">Tiny wins</text>
  </g>
</svg>
