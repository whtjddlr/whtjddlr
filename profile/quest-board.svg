<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Sungik Cho pixel quest board</title>
  <desc id="desc">A retro green developer quest board for a GitHub profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="42%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d9f99d"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="xp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bef264"/>
      <stop offset="55%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#14532d" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="34" fill="url(#bg)"/>
  <g opacity="0.5">
    <rect x="48" y="284" width="20" height="20" rx="4" fill="#bbf7d0"/>
    <rect x="76" y="284" width="20" height="20" rx="4" fill="#86efac"/>
    <rect x="104" y="284" width="20" height="20" rx="4" fill="#22c55e"/>
    <rect x="132" y="284" width="20" height="20" rx="4" fill="#dcfce7"/>
    <rect x="160" y="284" width="20" height="20" rx="4" fill="#bbf7d0"/>
    <rect x="188" y="284" width="20" height="20" rx="4" fill="#4ade80"/>
    <rect x="216" y="284" width="20" height="20" rx="4" fill="#dcfce7"/>
    <rect x="244" y="284" width="20" height="20" rx="4" fill="#22c55e"/>
    <rect x="272" y="284" width="20" height="20" rx="4" fill="#bbf7d0"/>
    <rect x="300" y="284" width="20" height="20" rx="4" fill="#86efac"/>
  </g>

  <rect x="42" y="42" width="1116" height="276" rx="28" fill="#ffffff" opacity="0.7"/>
  <rect x="70" y="68" width="488" height="224" rx="24" fill="url(#panel)" filter="url(#shadow)"/>
  <rect x="594" y="68" width="536" height="224" rx="24" fill="#ffffff" stroke="#bbf7d0" stroke-width="3" filter="url(#shadow)"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="102" y="112" font-size="19" font-weight="850" fill="#bef264">PLAYER PROFILE</text>
    <text x="100" y="168" font-size="56" font-weight="900" fill="#ffffff">SUNGIK CHO</text>
    <text x="104" y="206" font-size="20" font-weight="700" fill="#dcfce7">Python quests, automation runs, and learning logs.</text>

    <rect x="104" y="232" width="326" height="18" rx="9" fill="#022c22"/>
    <rect x="104" y="232" width="244" height="18" rx="9" fill="url(#xp)"/>
    <text x="446" y="248" font-size="15" font-weight="800" fill="#bbf7d0">LV. 15</text>

    <text x="628" y="112" font-size="20" font-weight="900" fill="#166534">TODAY'S QUEST BOARD</text>
    <text x="628" y="150" font-size="22" font-weight="800" fill="#052e16">01. Solve a small problem</text>
    <text x="628" y="188" font-size="22" font-weight="800" fill="#052e16">02. Automate one boring thing</text>
    <text x="628" y="226" font-size="22" font-weight="800" fill="#052e16">03. Leave a clean learning trace</text>

    <rect x="628" y="252" width="126" height="28" rx="14" fill="#dcfce7"/>
    <text x="648" y="272" font-size="14" font-weight="900" fill="#166534">Python</text>
    <rect x="766" y="252" width="150" height="28" rx="14" fill="#bbf7d0"/>
    <text x="786" y="272" font-size="14" font-weight="900" fill="#166534">Automation</text>
    <rect x="928" y="252" width="126" height="28" rx="14" fill="#86efac"/>
    <text x="950" y="272" font-size="14" font-weight="900" fill="#064e3b">Notes</text>
  </g>

  <g font-family="Fira Code, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" font-weight="700" fill="#14532d">
    <text x="82" y="330">&gt; quest run --daily --keep-growing</text>
  </g>
</svg>
