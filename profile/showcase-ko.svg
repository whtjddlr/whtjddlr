<svg width="1600" height="560" viewBox="0 0 1600 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11141B"/>
      <stop offset="1" stop-color="#0C0E14"/>
    </linearGradient>
    <style>
      text { font-family: "SFMono-Regular", "JetBrains Mono", "Cascadia Code", Consolas, "D2Coding", "Malgun Gothic", monospace; }
      .ln { font-size: 27px; font-weight: 500; }
      .arr{ fill:#56D364; } .path{ fill:#39C5CF; } .dollar{ fill:#768390; } .cmd{ fill:#E6EDF3; }
      .gry{ fill:#6E7681; } .hash{ fill:#FFA657; } .head{ fill:#6BE0FF; font-weight:700; }
      .ref{ fill:#7EE787; } .msg{ fill:#E6EDF3; } .sub{ fill:#ADBAC7; }
      .titlebar{ font-size:21px; fill:#768390; letter-spacing:1px; }
    </style>
  </defs>

  <rect width="1600" height="560" rx="18" fill="url(#bg)" stroke="#222A35" stroke-width="1.5"/>
  <circle cx="44" cy="40" r="8" fill="#FF5F56"/>
  <circle cx="72" cy="40" r="8" fill="#FFBD2E"/>
  <circle cx="100" cy="40" r="8" fill="#27C93F"/>
  <text x="800" y="47" text-anchor="middle" class="titlebar">sungik@github — git log</text>
  <line x1="0" y1="74" x2="1600" y2="74" stroke="#1C2330" stroke-width="1.5"/>

  <g class="ln">
    <text x="56" y="134"><tspan class="arr">➜</tspan>  <tspan class="path">~/work</tspan> <tspan class="dollar">$</tspan> <tspan class="cmd">git log --oneline --graph</tspan></text>

    <text x="56" y="206"><tspan class="hash">*</tspan> <tspan class="hash">a1f03c2</tspan> <tspan class="gry">(</tspan><tspan class="head">HEAD</tspan> <tspan class="gry">-&gt;</tspan> <tspan class="ref">main</tspan><tspan class="gry">)</tspan> <tspan class="msg">feat(KOK): 약속 장소 흐름을 가볍게</tspan></text>
    <text x="88" y="244"><tspan class="sub">제품 · 실시간 방 · 후보 비교 · 추첨</tspan></text>

    <text x="56" y="318"><tspan class="hash">*</tspan> <tspan class="hash">7be91d4</tspan> <tspan class="msg">feat(VQA): private 리더보드 1위 / 193팀</tspan></text>
    <text x="88" y="356"><tspan class="sub">AI · 데이터 관찰 · 학습 전략 · 제출 실험</tspan></text>

    <text x="56" y="430"><tspan class="hash">*</tspan> <tspan class="hash">3c0d8af</tspan> <tspan class="msg">feat(systems): 작은 시스템들을 하나의 흐름으로</tspan></text>
    <text x="88" y="468"><tspan class="sub">ETA 프로토타입 · 알고리즘 기록</tspan></text>

    <text x="56" y="524"><tspan class="arr">➜</tspan>  <tspan class="path">~/work</tspan> <tspan class="dollar">$</tspan> <tspan class="cmd">_</tspan></text>
  </g>
  <rect x="158" y="502" width="13" height="28" fill="#56D364"><animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/></rect>
</svg>
