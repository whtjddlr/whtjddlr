<svg width="1600" height="560" viewBox="0 0 1600 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#F4F6FB"/>
    </linearGradient>
    <linearGradient id="intel" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#FF5E8A"/><stop offset="1" stop-color="#2997FF"/></linearGradient>
    <linearGradient id="cardBlue" x1="88" y1="298" x2="538" y2="486" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#EAF3FF"/><stop offset="1" stop-color="#D8E9FF"/></linearGradient>
    <linearGradient id="cardVivid" x1="574" y1="298" x2="1024" y2="486" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#A24BFF"/><stop offset="1" stop-color="#FF5E8A"/></linearGradient>
    <linearGradient id="cardGreen" x1="1060" y1="298" x2="1510" y2="486" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#E6FBEF"/><stop offset="1" stop-color="#D2F6E1"/></linearGradient>
    <filter id="card" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#5B6478" flood-opacity="0.16"/></filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; }
      .kicker { font-size: 21px; font-weight: 700; letter-spacing: 1.5px; fill: #A24BFF; }
      .h  { font-size: 52px; font-weight: 600; letter-spacing: -2px; fill: #1D1D1F; }
      .p  { font-size: 26px; font-weight: 400; fill: #5C6470; }
      .num{ font-size: 30px; font-weight: 700; }
      .cardH { font-size: 38px; font-weight: 600; letter-spacing: -1px; }
      .cardP { font-size: 23px; font-weight: 400; }
    </style>
  </defs>

  <rect width="1600" height="560" rx="44" fill="url(#bg)"/>

  <text x="86" y="100" class="kicker">SELECTED WORK</text>
  <text x="84" y="172" class="h">완성까지 책임진 프로젝트들.</text>
  <text x="88" y="222" class="p">운영 중인 서비스, 경진대회 1위 모델, 그리고 개인 도구들.</text>

  <g filter="url(#card)"><rect x="88" y="298" width="450" height="188" rx="34" fill="url(#cardBlue)"/></g>
  <text x="128" y="362" class="num" fill="#0071E3">01</text>
  <text x="128" y="416" class="cardH" fill="#0A2540">KOK</text>
  <text x="128" y="456" class="cardP" fill="#3F5168">실시간 약속 장소 결정 서비스.</text>

  <g filter="url(#card)"><rect x="574" y="298" width="450" height="188" rx="34" fill="url(#cardVivid)"/></g>
  <text x="614" y="362" class="num" fill="#FFFFFF">02</text>
  <text x="614" y="416" class="cardH" fill="#FFFFFF">Recycle VQA</text>
  <text x="614" y="456" class="cardP" fill="#FFFFFF" opacity="0.9">193팀 중 1위 🏆</text>

  <g filter="url(#card)"><rect x="1060" y="298" width="450" height="188" rx="34" fill="url(#cardGreen)"/></g>
  <text x="1100" y="362" class="num" fill="#1AA35A">03</text>
  <text x="1100" y="416" class="cardH" fill="#0C3D23">개인 도구</text>
  <text x="1100" y="456" class="cardP" fill="#2E5740">ETA 계산기 · 알고리즘 학습 기록.</text>
</svg>
