<svg width="1600" height="560" viewBox="0 0 1600 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#EAEFF6"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2563EB"/><stop offset="1" stop-color="#14B8A6"/></linearGradient>
    <linearGradient id="navy" x1="0" y1="298" x2="0" y2="486" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#16243C"/><stop offset="1" stop-color="#0D1726"/></linearGradient>
    <filter id="card" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1E2A3D" flood-opacity="0.24"/></filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; }
      .kicker { font-size: 21px; font-weight: 700; letter-spacing: 1.5px; fill: #2563EB; }
      .h  { font-size: 52px; font-weight: 600; letter-spacing: -2px; fill: #0F172A; }
      .p  { font-size: 26px; font-weight: 400; fill: #475569; }
      .num{ font-size: 30px; font-weight: 700; }
      .cardH { font-size: 38px; font-weight: 600; letter-spacing: -1px; fill: #FFFFFF; }
      .cardP { font-size: 23px; font-weight: 400; fill: #AEBACB; }
    </style>
  </defs>

  <rect width="1600" height="560" rx="44" fill="url(#bg)"/>

  <text x="86" y="100" class="kicker">SELECTED WORK</text>
  <text x="84" y="172" class="h">완성까지 책임진 프로젝트들.</text>
  <text x="88" y="222" class="p">운영 중인 서비스, 경진대회 1위 모델, 그리고 개인 도구들.</text>

  <g filter="url(#card)"><rect x="88" y="298" width="450" height="188" rx="32" fill="url(#navy)"/></g>
  <rect x="88" y="298" width="6" height="188" rx="3" fill="#38BDF8"/>
  <text x="128" y="362" class="num" fill="#38BDF8">01</text>
  <text x="128" y="416" class="cardH">KOK</text>
  <text x="128" y="456" class="cardP">실시간 약속 장소 결정 서비스.</text>

  <g filter="url(#card)"><rect x="574" y="298" width="450" height="188" rx="32" fill="url(#navy)"/></g>
  <rect x="574" y="298" width="6" height="188" rx="3" fill="#F59E0B"/>
  <text x="614" y="362" class="num" fill="#F59E0B">02</text>
  <text x="614" y="416" class="cardH">Recycle VQA</text>
  <text x="614" y="456" class="cardP" fill="#FCD9A0">193팀 중 1위 🏆</text>

  <g filter="url(#card)"><rect x="1060" y="298" width="450" height="188" rx="32" fill="url(#navy)"/></g>
  <rect x="1060" y="298" width="6" height="188" rx="3" fill="#2DD4BF"/>
  <text x="1100" y="362" class="num" fill="#2DD4BF">03</text>
  <text x="1100" y="416" class="cardH">개인 도구</text>
  <text x="1100" y="456" class="cardP">ETA 계산기 · 알고리즘 학습 기록.</text>
</svg>
