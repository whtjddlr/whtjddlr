<svg width="1600" height="560" viewBox="0 0 1600 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F5F7"/>
    </linearGradient>
    <linearGradient id="intel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF5E8A"/><stop offset="1" stop-color="#2997FF"/>
    </linearGradient>
    <filter id="card" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1D1D1F" flood-opacity="0.10"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; }
      .kicker { font-size: 21px; font-weight: 600; letter-spacing: 1px; fill: #0071E3; }
      .h  { font-size: 52px; font-weight: 600; letter-spacing: -2px; fill: #1D1D1F; }
      .p  { font-size: 26px; font-weight: 400; fill: #6E6E73; }
      .num{ font-size: 30px; font-weight: 600; fill: url(#intel); }
      .cardH { font-size: 38px; font-weight: 600; letter-spacing: -1px; fill: #1D1D1F; }
      .cardP { font-size: 23px; font-weight: 400; fill: #6E6E73; }
    </style>
  </defs>

  <rect width="1600" height="560" rx="44" fill="url(#bg)"/>

  <text x="86" y="100" class="kicker">SELECTED WORK</text>
  <text x="84" y="172" class="h">쓰이고, 측정되고, 다시 다듬어진 작업들.</text>
  <text x="88" y="222" class="p">제품과 실험, 그리고 끝까지 완성해가는 방식.</text>

  <g filter="url(#card)"><rect x="88" y="298" width="450" height="188" rx="34" fill="#FFFFFF"/></g>
  <text x="128" y="362" class="num">01</text>
  <text x="128" y="416" class="cardH">KOK</text>
  <text x="128" y="456" class="cardP">약속 장소 흐름을 가볍게.</text>

  <g filter="url(#card)"><rect x="574" y="298" width="450" height="188" rx="34" fill="#1D1D1F"/></g>
  <text x="614" y="362" class="num">02</text>
  <text x="614" y="416" class="cardH" fill="#FFFFFF">Recycle VQA</text>
  <text x="614" y="456" class="cardP" fill="#A1A1A6">private 리더보드 1위.</text>

  <g filter="url(#card)"><rect x="1060" y="298" width="450" height="188" rx="34" fill="#FFFFFF"/></g>
  <text x="1100" y="362" class="num">03</text>
  <text x="1100" y="416" class="cardH">작은 시스템</text>
  <text x="1100" y="456" class="cardP">ETA와 알고리즘 기록.</text>
</svg>
