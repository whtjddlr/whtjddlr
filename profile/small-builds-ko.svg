<svg width="1600" height="430" viewBox="0 0 1600 430" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#F5F5F7"/>
    </linearGradient>
    <filter id="card" x="-15%" y="-15%" width="130%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#1D1D1F" flood-opacity="0.10"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif; }
      .kicker { font-size: 21px; font-weight: 600; letter-spacing: 1px; fill: #0071E3; }
      .title  { font-size: 44px; font-weight: 600; letter-spacing: -1px; fill: #1D1D1F; }
      .h  { font-size: 36px; font-weight: 600; fill: #1D1D1F; }
      .p  { font-size: 23px; font-weight: 400; fill: #6E6E73; }
      .chip { font-size: 18px; font-weight: 500; fill: #1D1D1F; }
    </style>
  </defs>

  <rect width="1600" height="430" rx="44" fill="url(#bg)"/>
  <text x="86" y="92" class="kicker">SIDE BUILDS</text>
  <text x="84" y="150" class="title">작은 프로젝트도 하나의 흐름으로.</text>

  <g filter="url(#card)"><rect x="88" y="212" width="678" height="142" rx="32" fill="#FFFFFF"/></g>
  <text x="132" y="270" class="h">BBaru</text>
  <text x="132" y="312" class="p">목표 도착 시간에 맞춘 ETA 기반 프로토타입.</text>
  <rect x="566" y="250" width="84" height="38" rx="19" fill="#F0F0F2"/><text x="608" y="275" text-anchor="middle" class="chip">React</text>
  <rect x="662" y="250" width="68" height="38" rx="19" fill="#F0F0F2"/><text x="696" y="275" text-anchor="middle" class="chip">Vite</text>

  <g filter="url(#card)"><rect x="834" y="212" width="678" height="142" rx="32" fill="#FFFFFF"/></g>
  <text x="878" y="270" class="h">CodeTree</text>
  <text x="878" y="312" class="p">문제 해결 감각을 유지하는 알고리즘 기록.</text>
  <rect x="1312" y="250" width="94" height="38" rx="19" fill="#F0F0F2"/><text x="1359" y="275" text-anchor="middle" class="chip">Python</text>
</svg>
